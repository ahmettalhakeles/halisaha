<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple ID ile Giriş Yap</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 40px;
            width: 380px;
            box-sizing: border-box;
            text-align: center;
            border: 1px solid #2c2c2e;
        }
        .apple-logo {
            width: 45px;
            height: 45px;
            margin-bottom: 20px;
            fill: #ffffff;
        }
        h2 {
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            margin: 0 0 8px 0;
        }
        p {
            font-size: 15px;
            color: #aeaeb2;
            margin: 0 0 24px 0;
        }
        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }
        label {
            font-size: 11px;
            font-weight: 600;
            color: #8e8e93;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #3a3a3c;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #2c2c2e;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.3);
        }
        .btn-submit {
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #e5e5ea;
        }
        .error {
            color: #ff453a;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <svg class="apple-logo" viewBox="0 0 170 170">
            <path d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.19-2.12-9.97-3.17-14.34-3.17-4.58 0-9.49 1.05-14.75 3.17-5.26 2.13-9.5 3.24-12.74 3.35-4.34.13-9.13-1.92-14.34-6.15-3.11-2.52-6.94-7.08-11.51-13.7-7.7-10.98-13.63-23.75-17.78-38.31-4.14-14.56-6.22-28.59-6.22-42.08 0-14.74 3.56-26.65 10.66-35.73 7.1-9.08 16.14-13.68 27.13-13.79 5.8 0 11.99 1.62 18.57 4.88 6.57 3.25 11.13 4.89 13.68 4.89 2.13 0 6.64-1.57 13.52-4.7 6.89-3.13 12.87-4.63 17.95-4.5 14.34.38 25.26 5.66 32.74 15.86-11.99 7.37-17.89 17.59-17.7 30.68.19 10.37 4.1 19.01 11.72 25.92 7.63 6.9 16.89 10.67 27.78 11.3-3.11 9.08-6.98 17.71-11.62 25.92zm-23.95-103.5c0-8.5 3.01-16.13 9.04-22.9 6.03-6.77 13.43-10.77 22.2-11.99.19 1.06.28 2.06.28 3 .06 8.06-2.92 15.54-8.92 22.42-6.02 6.88-13.59 10.98-22.7 12.27-.69-1.25-.9-1.93-.9-2.8z"/>
        </svg>
        <h2>Apple ile Giriş Yap</h2>
        <p>Apple ID hesabınızı kullanarak devam edin</p>
        
        <form id="oauthForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="name">Ad Soyad</label>
                <input type="text" id="name" required placeholder="Örn: Mehmet Can">
            </div>
            <div class="form-group">
                <label for="email">E-Posta (Apple ID)</label>
                <input type="email" id="email" required placeholder="example@icloud.com">
            </div>
            <div class="form-group">
                <label for="phone">Telefon Numarası (WhatsApp)</label>
                <input type="text" id="phone" required placeholder="5XXXXXXXXX" pattern="5[0-9]{9}" title="Lütfen 5 ile başlayan 10 haneli telefon numaranızı girin.">
            </div>
            <button type="submit" class="btn-submit">Devam Et</button>
            <div class="error" id="errorMsg"></div>
        </form>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = '';

            try {
                const response = await fetch('http://127.0.0.1:5000/api/oauth-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, provider: 'apple' })
                });
                const result = await response.json();
                if (result.success) {
                    if (window.opener) {
                        window.opener.postMessage({ type: 'oauth-success', user: result.user }, '*');
                    }
                    window.close();
                } else {
                    errorMsg.innerText = result.message || 'Giriş hatası oluştu.';
                }
            } catch (error) {
                console.error("Login request error:", error);
                errorMsg.innerText = 'Sunucuya bağlanılamadı!';
            }
        }
    </script>
</body>
</html>
